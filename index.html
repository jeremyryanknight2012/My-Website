<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StudyMath</title>
  <style>
    :root{
      --bg: #0b1220;
      --panel: #0f1a33;
      --panel2: #0c162e;
      --text: #e8eefc;
      --muted: #a9b6d6;
      --border: rgba(255,255,255,.10);
      --hover: rgba(255,255,255,.07);
      --active: rgba(255,255,255,.12);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: var(--bg);
      color: var(--text);
    }

    .app {
      display: grid;
      grid-template-rows: 56px 1fr;
      grid-template-columns: 260px 1fr;
      height: 100vh;
    }

    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel), var(--panel2));
    }

    .brand {
      font-weight: 800;
      letter-spacing: .2px;
      font-size: 18px;
    }

    aside {
      border-right: 1px solid var(--border);
      background: rgba(255,255,255,.02);
      padding: 14px;
    }

    .nav-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
      margin: 6px 10px 10px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid transparent;
      transition: background .15s ease, border-color .15s ease;
      cursor: pointer;
      user-select: none;
    }

    .nav a:hover {
      background: var(--hover);
      border-color: var(--border);
    }

    .nav a.active {
      background: var(--active);
      border-color: var(--border);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.35);
      flex: 0 0 auto;
    }

    main {
      padding: 18px;
    }

    .card {
      max-width: 900px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
    }

    .card h1 {
      margin: 0 0 8px 0;
      font-size: 22px;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .hint {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }

    code {
      background: rgba(255,255,255,.06);
      padding: 2px 6px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <!-- Title in the top-left -->
      <div class="brand">StudyMath</div>
    </header>

    <aside>
      <div class="nav-title">Pages</div>
      <nav class="nav" id="nav">
        <!-- 3 pages named PUT NAME HERE -->
        <a href="https://jeremyryanknight2012.github.io/My-Website/games.html" data-key="page1">
          <span class="dot"></span>
          <span>Games</span>
        </a>
        <a href="https://example.com/page2" data-key="page2">
          <span class="dot"></span>
          <span>PUT NAME HERE</span>
        </a>
        <a href="https://example.com/page3" data-key="page3">
          <span class="dot"></span>
          <span>PUT NAME HERE</span>
        </a>
      </nav>
    </aside>

    <main>
      <div class="card">
        <h1>Welcome to StudyMath</h1>
        <p>
          Click a page in the left sidebar. It will navigate <em>in this tab</em> and change the URL to an
          <code>example.com</code> link (no new tab, no embed).
        </p>
        <div class="hint" id="hint"></div>
      </div>
    </main>
  </div>

  <script>
    // Optional: visually mark the "active" link based on current URL
    // (This will mostly matter if you later change these links to your own site pages.)
    const nav = document.getElementById("nav");
    const hint = document.getElementById("hint");

    function setActiveFromUrl() {
      const current = window.location.href;
      const links = [...nav.querySelectorAll("a")];

      links.forEach(a => a.classList.remove("active"));
      const match = links.find(a => current.startsWith(a.href));
      if (match) match.classList.add("active");

      hint.textContent = "Current URL: " + current;
    }

    // Make sure clicking navigates in same tab (default behavior),
    // and NOT opening a new tab (no target=_blank used).
    nav.addEventListener("click", (e) => {
      const a = e.target.closest("a");
      if (!a) return;

      // Navigate in the same tab by setting location.
      // (Equivalent to normal link navigation, but explicit.)
      e.preventDefault();
      window.location.href = a.href;
    });

    setActiveFromUrl();
  </script>
</body>
</html>
